name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt and build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools libqt5sql5-sqlite

      - name: Build main application
        run: |
          qmake addressbook.pro
          make -j$(nproc)

      - name: Build and run tests
        run: |
          cd tests
          qmake tests.pro
          make -j$(nproc)
          ./addressbook_tests
